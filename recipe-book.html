<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-Day Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f4ee;
  --card: #fffdf9;
  --sage: #6b9c6d;
  --sage-light: #c8ddc9;
  --sage-dark: #3e6b41;
  --terra: #c46b44;
  --terra-light: #f0c4ae;
  --gold: #c49a2e;
  --plum: #7c5c8c;
  --ink: #1e1e1e;
  --gray: #6a6a6a;
  --line: #e5dfd5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:'Jost',sans-serif; color:var(--ink); }

/* LAYOUT */
.shell { display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--ink);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 28px 0 40px;
  scrollbar-width: thin;
  scrollbar-color: #444 transparent;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }

.sidebar-logo {
  padding: 0 22px 24px;
  border-bottom: 1px solid #333;
  margin-bottom: 16px;
}
.sidebar-logo h2 {
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;
  color:#fff;
  line-height:1.2;
}
.sidebar-logo p { font-size:11px; color:#888; margin-top:4px; letter-spacing:1px; text-transform:uppercase; }

.day-group { margin-bottom:4px; }
.day-group-title {
  padding: 10px 22px 6px;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#666;
  font-weight:600;
}
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding: 9px 22px;
  cursor:pointer;
  transition: background 0.15s;
  border-left: 3px solid transparent;
  color: #aaa;
  font-size:13px;
  font-weight:400;
}
.nav-item:hover { background:rgba(255,255,255,0.05); color:#ddd; }
.nav-item.active { background:rgba(107,156,109,0.15); border-left-color:var(--sage); color:#fff; }
.nav-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* MAIN */
.content { flex:1; overflow-x:hidden; }

.page-hero {
  background: var(--ink);
  padding: 48px 52px 44px;
  position:relative; overflow:hidden;
}
.page-hero::before {
  content:'';
  position:absolute; top:-80px; right:-80px;
  width:300px; height:300px; border-radius:50%;
  background:var(--sage-dark); opacity:0.15;
}
.page-hero::after {
  content:'';
  position:absolute; bottom:-50px; left:200px;
  width:200px; height:200px; border-radius:50%;
  background:var(--terra); opacity:0.1;
}
.page-hero-inner { position:relative; z-index:1; max-width:640px; }
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: #aaa;
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  margin-bottom: 20px;
  transition: color 0.2s;
  letter-spacing: 0.3px;
}
.back-link:hover { color: var(--sage-light); }

  display:inline-block;
  background:var(--sage);
  color:white; font-size:10px; font-weight:600;
  letter-spacing:2px; text-transform:uppercase;
  padding:4px 12px; border-radius:20px; margin-bottom:14px;
}
.page-hero h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,4vw,3rem); color:#fff; line-height:1.1; margin-bottom:10px;
}
.page-hero p { color:#aaa; font-size:14px; font-weight:300; line-height:1.6; }

/* Recipe sections */
.recipes-wrap { padding: 40px 52px 80px; }

.day-section { margin-bottom:60px; }
.day-section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:2rem; color:var(--ink);
  border-bottom:2px solid var(--line); padding-bottom:12px; margin-bottom:28px;
  display:flex; align-items:baseline; gap:14px;
}
.day-section-title span {
  font-family:'Jost',sans-serif;
  font-size:11px; color:var(--gray);
  letter-spacing:2px; text-transform:uppercase; font-weight:500;
}

.recipe-card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  margin-bottom:20px;
  overflow:hidden;
  transition: box-shadow 0.2s;
}
.recipe-card:hover { box-shadow:0 6px 28px rgba(0,0,0,0.07); }

.recipe-header {
  padding:22px 26px 18px;
  cursor:pointer;
  display:flex; align-items:flex-start; gap:16px;
  user-select:none;
}
.recipe-icon {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0; margin-top:2px;
}
.recipe-icon.breakfast { background:#fef5e0; }
.recipe-icon.lunch { background:#eaf4ea; }
.recipe-icon.snack { background:#f0eaf8; }
.recipe-icon.dinner { background:#fdf0ea; }

.recipe-header-text { flex:1; }
.recipe-type {
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  font-weight:600; margin-bottom:5px;
}
.recipe-type.breakfast { color:var(--gold); }
.recipe-type.lunch { color:var(--sage-dark); }
.recipe-type.snack { color:var(--plum); }
.recipe-type.dinner { color:var(--terra); }

.recipe-name {
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem; line-height:1.2; color:var(--ink);
}
.recipe-meta { display:flex; gap:14px; margin-top:8px; flex-wrap:wrap; }
.rmeta {
  font-size:11px; color:var(--gray);
  display:flex; align-items:center; gap:4px;
}
.recipe-toggle {
  width:28px; height:28px; border-radius:50%;
  background:var(--bg); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--gray);
  transition: all 0.2s; flex-shrink:0; margin-top:6px;
}
.recipe-card.open .recipe-toggle { background:var(--sage); border-color:var(--sage); color:white; transform:rotate(45deg); }

.fav-btn {
  background:none; border:none; cursor:pointer;
  font-size:17px; padding:4px 6px;
  opacity:0.3; transition:opacity 0.2s, transform 0.15s;
  flex-shrink:0; margin-top:4px; line-height:1;
}
.fav-btn:hover { opacity:1; transform:scale(1.2); }
.fav-btn.saved { opacity:1; }

.saved-section { margin-bottom:48px; }
.saved-section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:2rem; color:var(--ink);
  border-bottom:2px solid var(--terra-light); padding-bottom:12px; margin-bottom:28px;
  display:flex; align-items:baseline; gap:14px;
}
.saved-section-title span {
  font-family:'Jost',sans-serif;
  font-size:11px; color:var(--terra);
  letter-spacing:2px; text-transform:uppercase; font-weight:500;
}

.recipe-body {
  display:none;
  padding:0 26px 26px;
  border-top:1px solid var(--line);
  margin-top:2px;
}
.recipe-card.open .recipe-body { display:grid; grid-template-columns:1fr 1fr; gap:28px; padding-top:22px; }

@media(max-width:680px) {
  .recipe-card.open .recipe-body { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .recipes-wrap, .page-hero { padding-left:20px; padding-right:20px; }
}

.ingredients-section h4, .steps-section h4 {
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:var(--gray); font-weight:600; margin-bottom:12px;
}

.ingredients-list { list-style:none; }
.ingredients-list li {
  font-size:13.5px; padding:7px 0;
  border-bottom:1px solid var(--line);
  display:flex; gap:8px; align-items:flex-start;
  line-height:1.4; font-weight:300;
}
.ingredients-list li::before { content:'·'; color:var(--sage); font-size:18px; line-height:1; flex-shrink:0; }

.steps-list { list-style:none; counter-reset:steps; }
.steps-list li {
  counter-increment:steps;
  font-size:13.5px; padding:9px 0 9px 32px;
  border-bottom:1px solid var(--line);
  position:relative; line-height:1.6; font-weight:300;
}
.steps-list li::before {
  content:counter(steps);
  position:absolute; left:0; top:9px;
  width:20px; height:20px; border-radius:50%;
  background:var(--sage); color:white;
  font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
}
.steps-list li:last-child, .ingredients-list li:last-child { border-bottom:none; }

.recipe-tip {
  grid-column:1/-1;
  background:linear-gradient(135deg,var(--sage-dark),#2e5431);
  border-radius:10px; padding:14px 18px;
  color:white; font-size:13px; font-weight:300; line-height:1.6;
}
.recipe-tip strong { color:var(--sage-light); font-weight:600; }
</style>
</head>
<body>
<div class="shell">

<aside class="sidebar" id="sidebar"></aside>

<div class="content">
  <div class="page-hero">
    <div class="page-hero-inner">
      <a href="meal-plan.html" class="back-link">← Back to Meal Plan</a>
      <span class="hero-tag">🍽 Full Recipe Book</span>
      <h1>28 Healthy Recipes<br>for Your Week</h1>
      <p>Every meal from your 7-day plan — with ingredients, step-by-step instructions, and helpful tips. Click any recipe to expand it.</p>
    </div>
  </div>
  <div class="recipes-wrap" id="recipesWrap">
    <div id="loadingState" style="text-align:center;padding:80px 0;color:var(--gray)">
      <p style="font-size:15px;font-weight:300">Loading recipes…</p>
    </div>
  </div>
</div>

</div>

<script>
const mealEmoji = { breakfast:'☀️', lunch:'🌿', snack:'🍎', dinner:'🌙' };
const dotColors = { breakfast:'#c49a2e', lunch:'#3e6b41', snack:'#7c5c8c', dinner:'#c46b44' };
const mealRegistry = {};

// — Favorites (localStorage) —
function loadFavs() {
  try { return JSON.parse(localStorage.getItem('mealprep-favorites') || '[]'); }
  catch { return []; }
}
function saveFavs(favs) {
  localStorage.setItem('mealprep-favorites', JSON.stringify(favs));
}
function isSaved(name) {
  return loadFavs().some(f => f.name === name);
}
function toggleFav(key, btn) {
  const meal = mealRegistry[key];
  if (!meal) return;
  let favs = loadFavs();
  const idx = favs.findIndex(f => f.name === meal.name);
  if (idx >= 0) {
    favs.splice(idx, 1);
    btn.textContent = '🤍';
    btn.classList.remove('saved');
    btn.title = 'Save recipe';
  } else {
    favs.push(meal);
    btn.textContent = '❤️';
    btn.classList.add('saved');
    btn.title = 'Remove from saved';
  }
  saveFavs(favs);
  buildSaved();
}
function removeSaved(fi) {
  const favs = loadFavs();
  favs.splice(fi, 1);
  saveFavs(favs);
  buildSaved();
  // Refresh hearts on current week cards
  document.querySelectorAll('.fav-btn[data-key]').forEach(btn => {
    const meal = mealRegistry[btn.dataset.key];
    if (!meal) return;
    const saved = isSaved(meal.name);
    btn.textContent = saved ? '❤️' : '🤍';
    btn.classList.toggle('saved', saved);
  });
}

function recipeCardHTML(m, id, favBtnOnclick) {
  return `
    <div class="recipe-card" id="${id}">
      <div class="recipe-header" onclick="${id.startsWith('fav') ? `toggleSavedCard('${id}')` : `toggleRecipe('${id}')`}">
        <div class="recipe-icon ${m.type}">${mealEmoji[m.type]}</div>
        <div class="recipe-header-text">
          <div class="recipe-type ${m.type}">${m.type}</div>
          <h3 class="recipe-name">${m.name}</h3>
          <div class="recipe-meta">
            <span class="rmeta">🔥 ${m.cals} kcal</span>
            <span class="rmeta">⏱ ${m.time}</span>
            <span class="rmeta">🍽 ${m.servings} serving${m.servings>1?'s':''}</span>
          </div>
        </div>
        <button class="fav-btn ${favBtnOnclick.saved ? 'saved' : ''}" onclick="event.stopPropagation();${favBtnOnclick.fn}" title="${favBtnOnclick.saved ? 'Remove from saved' : 'Save recipe'}">${favBtnOnclick.saved ? '❤️' : '🤍'}</button>
        <div class="recipe-toggle">+</div>
      </div>
      <div class="recipe-body">
        <div class="ingredients-section">
          <h4>Ingredients</h4>
          <ul class="ingredients-list">${m.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="steps-section">
          <h4>Instructions</h4>
          <ol class="steps-list">${m.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
        </div>
        <div class="recipe-tip"><strong>💡 Chef's Tip:</strong> ${m.tip}</div>
      </div>
    </div>`;
}

function buildSaved() {
  const favs = loadFavs();
  const existing = document.getElementById('saved-section');
  if (existing) existing.remove();
  if (favs.length === 0) return;

  const section = document.createElement('div');
  section.id = 'saved-section';
  section.className = 'saved-section';
  section.innerHTML = `<h2 class="saved-section-title">❤️ Saved Recipes <span>${favs.length} saved</span></h2>` +
    favs.map((m, fi) => recipeCardHTML(m, `fav-${fi}`, { saved: true, fn: `removeSaved(${fi})` })).join('');

  const wrap = document.getElementById('recipesWrap');
  wrap.insertBefore(section, wrap.firstChild);
}

function buildSidebar(data) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="sidebar-logo"><h2>7-Day<br>Recipe Book</h2><p>28 healthy recipes</p></div>`;
  data.forEach((d, di) => {
    const group = document.createElement('div');
    group.className = 'day-group';
    group.innerHTML = `<div class="day-group-title">${d.day}</div>` +
      d.meals.map((m, mi) => `
        <div class="nav-item" id="nav-${di}-${mi}" onclick="scrollTo('recipe-${di}-${mi}')">
          <span class="nav-dot" style="background:${dotColors[m.type]}"></span>
          ${m.name}
        </div>
      `).join('');
    sidebar.appendChild(group);
  });
}

function buildRecipes(data) {
  const wrap = document.getElementById('recipesWrap');
  wrap.innerHTML = '';
  buildSaved();
  data.forEach((d, di) => {
    const section = document.createElement('div');
    section.className = 'day-section';
    section.innerHTML = `<h2 class="day-section-title">${d.day} <span>4 recipes</span></h2>` +
      d.meals.map((m, mi) => {
        const key = `${di}-${mi}`;
        mealRegistry[key] = m;
        return recipeCardHTML(m, `recipe-${di}-${mi}`, {
          saved: isSaved(m.name),
          fn: `toggleFav('${key}',this)`
        });
      }).join('');

    // Attach data-key to fav buttons after innerHTML (can't do it inline safely)
    wrap.appendChild(section);
    section.querySelectorAll('.fav-btn').forEach((btn, mi) => {
      btn.dataset.key = `${di}-${mi}`;
    });
  });
}

async function init() {
  try {
    const res = await fetch('/api/meal-plan');
    if (!res.ok) throw new Error('API error');
    const json = await res.json();
    buildSidebar(json.days);
    buildRecipes(json.days);
  } catch (e) {
    document.getElementById('recipesWrap').innerHTML =
      '<p style="color:var(--terra);font-size:14px;padding:40px 0">Failed to load recipes. Please refresh the page.</p>';
  }
}

init();

function toggleRecipe(id) {
  document.getElementById(id)?.classList.toggle('open');
}
function toggleSavedCard(id) {
  document.getElementById(id)?.classList.toggle('open');
}
function scrollTo(id) {
  const el = document.getElementById(id);
  if(el) { el.scrollIntoView({behavior:'smooth', block:'start'}); el.classList.add('open'); }
}
</script>
</body>
</html>
