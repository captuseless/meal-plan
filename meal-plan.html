<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-Day Healthy Meal Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f2;
    --sage: #7a9e7e;
    --sage-light: #a8c5ac;
    --sage-dark: #4d7a52;
    --terracotta: #c4714a;
    --terracotta-light: #e8a882;
    --charcoal: #2d2d2d;
    --mid-gray: #6b6b6b;
    --light-gray: #e8e3dc;
    --gold: #c9962a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--charcoal);
    min-height: 100vh;
  }

  header {
    background: var(--charcoal);
    padding: 48px 40px 40px;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: var(--sage-dark);
    opacity: 0.18;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 120px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--terracotta);
    opacity: 0.12;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .header-tag {
    display: inline-block;
    background: var(--sage);
    color: white;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 12px;
  }

  header p {
    color: var(--sage-light);
    font-size: 15px;
    font-weight: 300;
    max-width: 460px;
    line-height: 1.6;
  }

  .stats-bar {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: white;
  }

  .stat-label {
    font-size: 11px;
    color: var(--sage-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,0.15);
    align-self: stretch;
  }

  /* Day tabs */
  .day-nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--light-gray);
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .day-nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .day-nav-inner::-webkit-scrollbar { display: none; }

  .day-btn {
    flex-shrink: 0;
    padding: 16px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--mid-gray);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .day-btn:hover { color: var(--sage-dark); }

  .day-btn.active {
    color: var(--sage-dark);
    border-bottom-color: var(--sage);
    font-weight: 600;
  }

  /* Main content */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 40px 60px;
  }

  .day-panel { display: none; }
  .day-panel.active {
    display: block;
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--charcoal);
  }

  .day-calories {
    font-size: 13px;
    color: var(--mid-gray);
    font-weight: 400;
  }

  .day-calories span {
    color: var(--terracotta);
    font-weight: 600;
    font-size: 15px;
  }

  /* Meal cards */
  .meals-grid {
    display: grid;
    gap: 20px;
  }

  .meal-card {
    background: white;
    border-radius: 16px;
    padding: 24px 26px;
    border: 1px solid var(--light-gray);
    transition: box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .meal-card:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .meal-card.checked {
    background: #f6faf6;
    border-color: var(--sage-light);
  }

  .meal-card.checked::after {
    content: '✓';
    position: absolute;
    top: 20px; right: 22px;
    width: 28px; height: 28px;
    background: var(--sage);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
  }

  .meal-type {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .meal-type.breakfast { color: var(--gold); }
  .meal-type.lunch { color: var(--sage-dark); }
  .meal-type.dinner { color: var(--terracotta); }
  .meal-type.snack { color: #8b72c8; }

  .meal-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .meal-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
    color: var(--charcoal);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .meal-desc {
    font-size: 13.5px;
    color: var(--mid-gray);
    line-height: 1.6;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .meal-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--mid-gray);
    background: var(--cream);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--light-gray);
  }

  /* Shopping list */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin: 40px 0 18px;
    color: var(--charcoal);
  }

  .tips-card {
    background: linear-gradient(135deg, var(--sage-dark) 0%, #3d6b44 100%);
    border-radius: 16px;
    padding: 26px 28px;
    color: white;
    margin-top: 40px;
  }

  .tips-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 14px;
    color: var(--sage-light);
  }

  .tips-list {
    list-style: none;
    display: grid;
    gap: 10px;
  }

  .tips-list li {
    font-size: 13.5px;
    font-weight: 300;
    line-height: 1.5;
    padding-left: 20px;
    position: relative;
    opacity: 0.92;
  }

  .tips-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--terracotta-light);
  }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--light-gray);
    border-radius: 8px;
    height: 6px;
    margin-top: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--sage) 0%, var(--sage-dark) 100%);
    border-radius: 8px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 12px;
    color: var(--mid-gray);
    margin-top: 6px;
    text-align: right;
  }

  .recipes-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--terracotta);
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: 24px;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }
  .recipes-link:hover { background: #b05e38; transform: translateY(-1px); }

  @media (max-width: 600px) {
    header, .day-nav, .main { padding-left: 20px; padding-right: 20px; }
    .day-btn { padding: 14px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-tag">🌿 Personalized Plan</span>
    <h1>Your 7-Day<br>Healthy Meal Plan</h1>
    <p>Balanced, satisfying meals designed for weight loss and lasting wellness — no restriction, just smart choices.</p>
    <a href="recipe-book.html" class="recipes-link">📖 View All Recipes →</a>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value">~1,500</span>
        <span class="stat-label">Calories / day</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">4</span>
        <span class="stat-label">Meals / day</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">High</span>
        <span class="stat-label">Protein focus</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">Whole</span>
        <span class="stat-label">Food-based</span>
      </div>
    </div>
  </div>
</header>

<nav class="day-nav">
  <div class="day-nav-inner" id="dayNav"></div>
</nav>

<main class="main" id="mainContent">
  <div id="loadingState" style="text-align:center;padding:80px 0;color:var(--mid-gray)">
    <p style="font-size:15px;font-weight:300">Loading your meal plan…</p>
  </div>
</main>

<script>
let days = [];

const mealEmoji = { breakfast: "☀️", lunch: "🌿", snack: "🍎", dinner: "🌙" };

function buildNav() {
  const nav = document.getElementById('dayNav');
  days.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === 0 ? ' active' : '');
    btn.textContent = d.day;
    btn.onclick = () => switchDay(i);
    nav.appendChild(btn);
  });
}

function buildPanels() {
  const main = document.getElementById('mainContent');
  days.forEach((d, di) => {
    const panel = document.createElement('div');
    panel.className = 'day-panel' + (di === 0 ? ' active' : '');
    panel.id = 'panel-' + di;

    const checkedKey = `checked-${di}`;
    const checked = JSON.parse(sessionStorage.getItem(checkedKey) || '[]');

    panel.innerHTML = `
      <div class="day-header">
        <h2 class="day-title">${d.day}</h2>
        <div class="day-calories">Total: <span>~${d.calories} kcal</span></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="prog-${di}" style="width:${(checked.length/4)*100}%"></div>
      </div>
      <p class="progress-label" id="prog-label-${di}">${checked.length} of 4 meals logged</p>
      <div class="meals-grid" id="meals-${di}">
        ${d.meals.map((m, mi) => `
          <div class="meal-card${checked.includes(mi) ? ' checked' : ''}" id="card-${di}-${mi}" onclick="toggleMeal(${di},${mi})">
            <div class="meal-type ${m.type}">${mealEmoji[m.type]} <span>${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</span></div>
            <h3 class="meal-name">${m.name}</h3>
            <p class="meal-desc">${m.desc}</p>
            <div class="meal-meta">
              <span class="meta-pill">🔥 ${m.cals} kcal</span>
              <span class="meta-pill">💪 ${m.protein} protein</span>
              <span class="meta-pill">⏱ ${m.prep}</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;

    if (di === 6) {
      panel.innerHTML += `
        <div class="tips-card">
          <h3>🌱 Tips for Success</h3>
          <ul class="tips-list">
            <li>Drink at least 8 glasses of water daily — hunger is often thirst in disguise.</li>
            <li>Prep grains (quinoa, brown rice, farro) in a big batch on Sundays to save time all week.</li>
            <li>Eat slowly and pause halfway through meals — your brain needs 20 minutes to register fullness.</li>
            <li>Keep healthy snacks visible and accessible so you reach for them first.</li>
            <li>Don't skip meals — consistent eating prevents overeating later in the day.</li>
            <li>Get 7–8 hours of sleep. Poor sleep increases hunger hormones like ghrelin significantly.</li>
          </ul>
        </div>
      `;
    }

    main.appendChild(panel);
  });
}

function toggleMeal(di, mi) {
  const card = document.getElementById(`card-${di}-${mi}`);
  const checkedKey = `checked-${di}`;
  let checked = JSON.parse(sessionStorage.getItem(checkedKey) || '[]');

  if (checked.includes(mi)) {
    checked = checked.filter(x => x !== mi);
    card.classList.remove('checked');
  } else {
    checked.push(mi);
    card.classList.add('checked');
  }

  sessionStorage.setItem(checkedKey, JSON.stringify(checked));
  document.getElementById(`prog-${di}`).style.width = `${(checked.length / 4) * 100}%`;
  document.getElementById(`prog-label-${di}`).textContent = `${checked.length} of 4 meals logged`;
}

function switchDay(i) {
  document.querySelectorAll('.day-btn').forEach((b, bi) => b.classList.toggle('active', bi === i));
  document.querySelectorAll('.day-panel').forEach((p, pi) => p.classList.toggle('active', pi === i));
}

async function init() {
  try {
    const res = await fetch('/api/meal-plan');
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`HTTP ${res.status}: ${body}`);
    }
    const json = await res.json();
    days = json.days;
    document.getElementById('loadingState').remove();
    buildNav();
    buildPanels();
  } catch (e) {
    document.getElementById('loadingState').innerHTML =
      `<p style="color:var(--terracotta);font-size:14px">Failed to load meal plan. Please refresh the page.</p>
       <p style="color:var(--mid-gray);font-size:12px;margin-top:8px;font-family:monospace">${e.message}</p>`;
  }
}

init();
</script>
</body>
</html>
